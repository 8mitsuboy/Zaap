<svg width="900" height="520" viewBox="0 0 900 520" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="900" height="520" rx="24" fill="#1E1E24"/>
  <text x="54" y="76" fill="#F3D87A" font-size="28" font-weight="700" font-family="Arial, sans-serif">購入金額という属性を分ける</text>
  <text x="54" y="116" fill="#D7D7DD" font-size="20" font-family="Arial, sans-serif">今回は有効パーティションだけに絞る</text>

  <rect x="78" y="182" width="320" height="180" rx="24" fill="#2F3648" stroke="#6A7DA8" stroke-width="3"/>
  <text x="238" y="238" text-anchor="middle" fill="#B9C7FF" font-size="28" font-weight="700" font-family="Arial, sans-serif">有効</text>
  <text x="238" y="292" text-anchor="middle" fill="#FFFFFF" font-size="36" font-weight="700" font-family="Arial, sans-serif">5000円未満</text>
  <text x="238" y="338" text-anchor="middle" fill="#D7D7DD" font-size="24" font-family="Arial, sans-serif">0円〜4999円</text>

  <rect x="502" y="182" width="320" height="180" rx="24" fill="#2B4038" stroke="#4C9D80" stroke-width="3"/>
  <text x="662" y="238" text-anchor="middle" fill="#9AE6C8" font-size="28" font-weight="700" font-family="Arial, sans-serif">有効</text>
  <text x="662" y="292" text-anchor="middle" fill="#FFFFFF" font-size="36" font-weight="700" font-family="Arial, sans-serif">5000円以上</text>
  <text x="662" y="338" text-anchor="middle" fill="#D7D7DD" font-size="24" font-family="Arial, sans-serif">5000円〜</text>

  <text x="450" y="438" text-anchor="middle" fill="#FFFFFF" font-size="24" font-weight="700" font-family="Arial, sans-serif">各グループから代表値を1つ選べばよい</text>
  <text x="450" y="476" text-anchor="middle" fill="#B4B4BE" font-size="20" font-family="Arial, sans-serif">例: 3000円 / 5000円</text>
</svg>
